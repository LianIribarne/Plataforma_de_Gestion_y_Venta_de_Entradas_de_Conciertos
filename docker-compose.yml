services:
  backend:
    build: ./backend
    container_name: django_backend
    command: >
      sh -c "
        python manage.py migrate &&
        python manage.py loaddata backend/fixtures/*.json &&
        python manage.py seed_conciertos &&
        python manage.py sync_conciertos &&
        gunicorn backend.wsgi:application --bind 0.0.0.0:8000
      "
    volumes:
      - ./backend:/app
      - ./backend/media:/app/media
    env_file:
      - ./backend/.env.docker
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  celery:
    build: ./backend
    container_name: celery_worker
    command: celery -A backend worker -l info
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env.docker
    depends_on:
      - backend
      - db
      - redis

  frontend:
    build: ./frontend
    container_name: react_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

  db:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_DB: integrador
      POSTGRES_USER: integrador_user
      POSTGRES_PASSWORD: integrador_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
